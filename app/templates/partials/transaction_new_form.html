<tr id="new-manual-tx" class="bg-emerald-50 border-b border-emerald-200">
  <td colspan="7" class="px-4 py-2">
    <form id="manual-tx-form"
          hx-post="/api/transactions/manual"
          hx-target="#new-manual-tx"
          hx-swap="outerHTML"
          class="flex flex-wrap items-end gap-3">
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-wider text-emerald-600">Data</label>
        <input type="date" name="date" value="{{ today }}"
               class="rounded-md border-emerald-200 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none w-32" required />
      </div>
      <div class="flex flex-col gap-1 flex-1 min-w-[160px]">
        <label class="text-[10px] font-semibold uppercase tracking-wider text-emerald-600">Descrição</label>
        <input type="text" name="description" placeholder="Ex: Almoço no restaurante..."
               class="rounded-md border-emerald-200 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none w-full" required />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-wider text-emerald-600">Valor (R$)</label>
        <input type="number" step="0.01" name="amount" placeholder="0,00"
               class="rounded-md border-emerald-200 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none w-28 text-right" required />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-wider text-emerald-600">Conta</label>
        <div class="flex items-center gap-1">
          <select name="account_id"
                  class="rounded-md border-emerald-200 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none" required>
            <option value="">Selecione</option>
            {% for a in accounts %}
            <option value="{{ a.id }}">{{ a.name }}</option>
            {% endfor %}
          </select>
          <button type="button" onclick="document.getElementById('nova-conta-modal-statement').classList.remove('hidden')"
                  class="rounded-md border border-emerald-200 bg-white p-1 text-slate-400 hover:text-emerald-600 hover:border-emerald-300 hover:bg-emerald-50 transition-colors"
                  title="Criar nova conta">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          </button>
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-wider text-emerald-600">Categoria</label>
        <select name="category_id"
                class="rounded-md border-emerald-200 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
          <option value="">Sem categoria</option>
          {% for c in categories %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-[10px] font-semibold uppercase tracking-wider text-emerald-600">Responsável</label>
        <select name="user_id"
                class="rounded-md border-emerald-200 bg-white px-2 py-1.5 text-sm shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none">
          <option value="">—</option>
          {% for m in members %}
          <option value="{{ m.id }}">{{ m.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex items-center gap-1 pb-1">
        <button type="submit"
                class="rounded-md bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white shadow-sm hover:bg-emerald-700 transition-colors">
          Adicionar
        </button>
        <button type="button"
                hx-get="/api/transactions"
                hx-target="#statement-content"
                hx-swap="outerHTML"
                class="rounded-md border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">
          Cancelar
        </button>
      </div>
    </form>
  </td>
</tr>
