<div class="file-card-swap-target rounded-xl border border-amber-200 bg-white shadow-sm overflow-hidden">
  <div class="bg-gradient-to-r from-amber-50 to-white border-b border-amber-100 px-6 py-4">
    <div class="flex items-center gap-3">
      <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-amber-100">
        <svg class="h-5 w-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-sm font-semibold text-slate-900">Arquivo Protegido</h3>
        <p class="text-xs text-amber-700 font-medium truncate max-w-[280px]">{{ filename }}</p>
      </div>
    </div>
  </div>

  <div class="p-6">
    <div class="flex items-center gap-2 mb-4">
      <svg class="h-4 w-4 text-amber-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <p class="text-sm text-slate-600">
        Este arquivo está protegido por senha.<br>
        <span class="text-xs text-slate-400">Informe a senha para desbloquear</span>
      </p>
    </div>

    <form hx-post="/api/decrypt-statement"
          hx-target="closest .file-card-swap-target"
          hx-swap="outerHTML"
          class="space-y-3">
      <input type="hidden" name="file_id" value="{{ file_id }}" />
      <div class="flex items-center gap-2">
        <input type="password" name="password" placeholder="Senha do PDF" autocomplete="off" required autofocus
               class="block w-full rounded-lg border-amber-300 bg-white px-4 py-2.5 text-sm text-slate-700 shadow-sm placeholder-slate-400 focus:border-amber-400 focus:ring-2 focus:ring-amber-200 focus:outline-none transition-colors" />
        <button type="submit"
                class="inline-flex items-center gap-1.5 rounded-lg bg-amber-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 flex-shrink-0">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
          Desbloquear
        </button>
      </div>
      {% if error %}
      <div class="flex items-start gap-2 text-sm text-rose-500">
        <svg class="h-4 w-4 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <span>{{ error_message if error_message is defined else 'Senha inválida. Os bancos costumam usar o CPF (apenas números) ou os 4 primeiros dígitos do cartão.' }}</span>
      </div>
      {% endif %}
    </form>
  </div>
</div>
