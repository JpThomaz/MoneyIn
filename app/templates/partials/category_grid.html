<div id="category-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
  {% for cat in categories %}
  <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm hover:shadow-md transition-all group">
    <div class="flex items-start justify-between">
      <div class="flex items-center gap-3">
        <span class="inline-block w-4 h-4 rounded-full flex-shrink-0" style="background-color: {{ cat.color }}"></span>
        <div>
          <p class="text-sm font-medium text-slate-900">{{ cat.name }}</p>
          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
            {% if cat.household_id is none %}
              bg-slate-100 text-slate-500
            {% else %}
              bg-emerald-50 text-emerald-600
            {% endif %}">
            {% if cat.household_id is none %}
              Sistema
            {% else %}
              Personalizada
            {% endif %}
          </span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs font-medium px-2 py-0.5 rounded-md
          {% if cat.type == 'income' %}bg-emerald-50 text-emerald-600{% else %}bg-rose-50 text-rose-600{% endif %}">
          {{ 'Receita' if cat.type == 'income' else 'Despesa' }}
        </span>
        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onclick="openEditCategory('{{ cat.id }}', '{{ cat.name }}', '{{ cat.color }}', '{{ cat.type }}')"
                  class="p-1.5 rounded-md text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button hx-delete="/api/categorias/{{ cat.id }}"
                  hx-target="#category-grid"
                  hx-swap="outerHTML"
                  hx-confirm="Remover categoria '{{ cat.name }}'?"
                  class="p-1.5 rounded-md text-red-400 hover:text-red-600 hover:bg-red-50 transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
