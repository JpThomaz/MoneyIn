<div>
  <div class="mb-6 flex items-center gap-3">
    <span class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-1.5 text-sm font-medium text-slate-700">
      <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Origem: {{ filename }}
    </span>
    <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-50 px-3 py-1.5 text-xs font-medium text-emerald-700">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      {{ transactions|length }} transação{{ 'ões' if transactions|length != 1 else '' }} encontrada{{ 's' if transactions|length != 1 else '' }}
    </span>
  </div>

  <form id="review-form"
        hx-post="/api/upload-statement/confirm"
        hx-target="#main-upload-container"
        hx-indicator="#confirm-loading"
        class="space-y-6">

    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-100">
          <thead>
            <tr class="bg-slate-50">
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500">Data</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500">Descrição</th>
              <th scope="col" class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider text-slate-500">Valor (R$)</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500">Categoria</th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-slate-500">Responsável</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            {% for t in transactions %}
            <tr class="transaction-row transition-colors hover:bg-slate-50/50">
              <td class="px-4 py-2.5">
                <input type="date"
                       class="tx-date block w-full rounded-md border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-colors"
                       value="{{ t.data }}"
                       required />
              </td>
              <td class="px-4 py-2.5 min-w-[200px]">
                <input type="text"
                       class="tx-desc block w-full rounded-md border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-colors"
                       value="{{ t.descricao }}"
                       required />
              </td>
              <td class="px-4 py-2.5">
                <input type="number" step="0.01"
                       class="tx-amount block w-32 ml-auto rounded-md border-slate-200 bg-white px-3 py-2 text-sm text-right font-medium shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-colors {% if t.valor < 0 %}text-rose-600{% else %}text-emerald-600{% endif %}"
                       value="{{ t.valor }}"
                       required />
              </td>
              <td class="px-4 py-2.5">
                <select class="tx-category block w-full rounded-md border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-colors">
                  <option value="">Sem categoria</option>
                  {% for cat in categories %}
                  <option value="{{ cat.id }}" {% if cat.name.lower() == (t.categoria or '').lower() %}selected{% endif %}>{{ cat.name }}</option>
                  {% endfor %}
                </select>
                {% if t.categoria %}
                <input type="hidden" class="tx-categoria-name" value="{{ t.categoria }}" />
                {% endif %}
              </td>
              <td class="px-4 py-2.5">
                <select class="tx-user block w-full rounded-md border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-colors">
                  {% for member in household_members %}
                  <option value="{{ member.id }}" {% if member.id == current_user_id %}selected{% endif %}>{{ member.name }}</option>
                  {% endfor %}
                </select>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

    <input type="hidden" name="account_id" value="{{ account_id }}" />

    <div class="flex items-center justify-between rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <button type="button"
              hx-get="/upload"
              hx-target="#main-upload-container"
              class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm font-medium text-slate-600 shadow-sm transition-colors hover:bg-slate-50 hover:text-slate-700">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        Rejeitar
      </button>

      <div class="flex items-center gap-3">
        <div id="confirm-loading" class="htmx-indicator flex items-center gap-2 text-sm text-slate-400">
          <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Salvando...
        </div>
        <button type="submit"
                class="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-6 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:ring-offset-2">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Inserir Informações
        </button>
      </div>
    </div>
  </form>
</div>

<script>
  (function() {
    var form = document.getElementById('review-form');
    if (!form) return;

    form.addEventListener('htmx:configRequest', function(evt) {
      if (evt.detail.path !== '/api/upload-statement/confirm') return;

      var rows = [];
      document.querySelectorAll('.transaction-row').forEach(function(row) {
        var catNameInput = row.querySelector('.tx-categoria-name');
        rows.push({
          data: row.querySelector('.tx-date').value,
          descricao: row.querySelector('.tx-desc').value,
          valor: parseFloat(row.querySelector('.tx-amount').value) || 0,
          category_id: row.querySelector('.tx-category').value || null,
          categoria: catNameInput ? catNameInput.value : null,
          user_id: row.querySelector('.tx-user').value || null,
        });
      });

      evt.detail.parameters['transactions'] = JSON.stringify(rows);

      var token = localStorage.getItem('token');
      if (token) {
        evt.detail.headers['Authorization'] = 'Bearer ' + token;
      }
    });
  })();
</script>
